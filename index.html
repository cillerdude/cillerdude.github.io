<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Crime-Map UK</title>
    <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.9.1/mapbox-gl.css" rel="stylesheet">
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.9.1/mapbox-gl.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/png" href="images/favicon.ico">
</head>
<body>
    <div id="map"></div>
    <div class="filter-container">
        <label for="data-source-select">Select Data Source:</label>
        <select id="data-source-select">
            <option value="Counties">Counties</option>
            <option value="Ward">Middle layer (Ward)</option>
            <option value="LSOA">Detailed view (LSOA)</option>
        </select>
        <button id="toggle-description">🛈</button>
        <div class="filter-container__row" style="margin-top:8px;">
            <label for="border-toggle">Borders:</label>
            <button id="border-toggle" class="toggle-btn active">On</button>
        </div>
        <!-- Description Modal -->
        <div id="description-modal" class="popup-modal">
            <div class="popup-content">
                <span id="close-description" class="popup-close">&times;</span>
                <p class="map-description">
                    This map displays crime rates between November 2023 - November 2024.<br>
                    Greater Manchester police declined a data request, so their data is missing.<br>
                    Counties offer a broad overview, Wards provide a middle level of detail, and LSOA gives the most detailed breakdown.
                </p>
            </div>
        </div>
        <div id="loading-spinner" class="loading-spinner"></div>
    </div>
    <nav id="filter-group" class="filter-group"></nav>

<script>
    // ── Modal controls ──────────────────────────────────────────────────────────
    document.getElementById('toggle-description').addEventListener('click', function () {
        document.getElementById('description-modal').style.display = 'block';
    });
    document.getElementById('close-description').addEventListener('click', function () {
        document.getElementById('description-modal').style.display = 'none';
    });
    window.addEventListener('click', function (event) {
        const modal = document.getElementById('description-modal');
        if (event.target === modal) modal.style.display = 'none';
    });

    // ── Map setup ───────────────────────────────────────────────────────────────
    mapboxgl.accessToken = 'pk.eyJ1IjoiY21jY2FsbW9udCIsImEiOiJjbTU1cjRrZDQwcXFhMmlyMzRmcXQ2czlsIn0.geuByGMLkRs6ZBQoF8MWzw';
    const map = new mapboxgl.Map({container: 'map', style: 'mapbox://styles/mapbox/streets-v12', center: [-1.910625, 52.682557], zoom: 6});

    const filterGroup = document.getElementById('filter-group');

    const fields = [
        { key: 'Anti-social behaviour',         label: 'Anti-social behaviour' },
        { key: 'Bicycle theft',                 label: 'Bicycle theft' },
        { key: 'Burglary',                      label: 'Burglary' },
        { key: 'Criminal damage and arson',     label: 'Criminal damage and arson' },
        { key: 'Drugs',                         label: 'Drugs' },
        { key: 'Other crime',                   label: 'Other crime' },
        { key: 'Other theft',                   label: 'Other theft' },
        { key: 'Possession of weapons',         label: 'Possession of weapons' },
        { key: 'Public order',                  label: 'Public order' },
        { key: 'Shoplifting',                   label: 'Shoplifting' },
        { key: 'Theft from the person',         label: 'Theft from the person' },
        { key: 'Vehicle crime',                 label: 'Vehicle crime' },
        { key: 'Violence and sexual offences',  label: 'Violence and sexual offences' }
    ];

    const lookupTable = {
		LSOA: {
			"Anti-social behaviour": {perc10: 0.0007756447547023463, perc50: 0.001282051282051282, perc90: 0.002904754624675126},
            "Bicycle theft": {perc10: 0.0, perc50: 0.0005753739930955121, perc90: 0.0008673026886383347},
            "Burglary": {perc10: 0.0005856212752764477, perc50: 0.0008311170212765958, perc90: 0.0012247237856993953},
            "Criminal damage and arson": {perc10: 0.0006614654002713704, perc50: 0.0009689922480620155, perc90: 0.0015885623510722795},
            "Drugs": {perc10: 0.0004664179104477612, perc50: 0.0007224389539083948, perc90: 0.001095690284879474},
            "Other crime": {perc10: 0.00048514703687117485, perc50: 0.0006925207756232687, perc90: 0.000981767180925666},
            "Other theft": {perc10: 0.0006269592476489029, perc50: 0.0008663634394628547, perc90: 0.0014156285390713476},
            "Possession of weapons": {perc10: 0.0, perc50: 0.0006131207847946045, perc90: 0.0008656509695290858},
            "Public order": {perc10: 0.0006341154090044388, perc50: 0.0009301870165475375, perc90: 0.001584685598377282},
            "Robbery": {perc10: 0.0, perc50: 0.0005959475566150178, perc90: 0.0008875739644970414},
            "Shoplifting": {perc10: 0.0, perc50: 0.0006311256311256311, perc90: 0.0020355292376017767},
            "Theft from the person": {perc10: 0.0, perc50: 0.0005506607929515419, perc90: 0.0008207070707070708},
            "Vehicle crime": {perc10: 0.0006214557601180766, perc50: 0.0009175842509175843, perc90: 0.0013859400802075962},
            "Violence and sexual offences": {perc10: 0.0012634238787113076, perc50: 0.0022529379528709735, perc90: 0.005257488303294372}
		},
		Ward: {
			"Anti-social behaviour": {perc10: 0.000829801226285121, perc50: 0.0012943766525428417, perc90: 0.0026167541596217713},
            "Bicycle theft": {perc10: 0.0, perc50: 0.00044829647340107593, perc90: 0.0007446352415551593},
            "Burglary": {perc10: 0.0006224066390041494, perc50: 0.000817796430461488, perc90: 0.001070322460379698},
            "Criminal damage and arson": {perc10: 0.0007186136443534545, perc50: 0.0009605124499878875, perc90: 0.0014363881624437505},
            "Drugs": {perc10: 0.00048141729250914694, perc50: 0.0007117437722419929, perc90: 0.0009653106368085298},
            "Other crime": {perc10: 0.0005224660397074191, perc50: 0.0006903353057199211, perc90: 0.0008798829941006483},
            "Other theft": {perc10: 0.0006744526027037238, perc50: 0.0008759611863649841, perc90: 0.0012805463489057238},
            "Possession of weapons": {perc10: 0.00030036795073965606, perc50: 0.0005523483714631887, perc90: 0.0007586856425282545},
            "Public order": {perc10: 0.0006823461091753775, perc50: 0.0009232105282123205, perc90: 0.0014265130620171723},
            "Robbery": {perc10: 0.0, perc50: 0.000461361014994233, perc90: 0.0007545326395892546},
            "Shoplifting": {perc10: 0.00020661157024793388, perc50: 0.0006571798188874515, perc90: 0.0017240815772488038},
            "Theft from the person": {perc10: 0.0, perc50: 0.00039840637450199205, perc90: 0.0007011967090501122},
            "Vehicle crime": {perc10: 0.0006243114212265883, perc50: 0.0008816394153961461, perc90: 0.0012210363597493792},
            "Violence and sexual offences": {perc10: 0.001391576731135305, perc50: 0.002280979421737679, perc90: 0.004494719863648171}
		},
        Counties: {
            "Anti-social behaviour":        { perc10: 0.001066460628576798,   perc50: 0.001489042544111367,  perc90: 0.0024504635463915834 },
            "Bicycle theft":                { perc10: 0.00030282485958739225, perc50: 0.0004422372124064202, perc90: 0.0006502040458278222 },
            "Burglary":                     { perc10: 0.0007413791104315077,  perc50: 0.0008204013427777954, perc90: 0.0009757324382795088 },
            "Criminal damage and arson":    { perc10: 0.0008590091054629157,  perc50: 0.0010117131162713324, perc90: 0.0012845773559388856 },
            "Drugs":                        { perc10: 0.0006205607878787457,  perc50: 0.000725713043834098,  perc90: 0.0008826163330639831 },
            "Other crime":                  { perc10: 0.0006171389654584264,  perc50: 0.0006998415275300889, perc90: 0.000791853219631479  },
            "Other theft":                  { perc10: 0.0008198361262441768,  perc50: 0.0009435552729000787, perc90: 0.0011359136389719013 },
            "Possession of weapons":        { perc10: 0.0004417105303334121,  perc50: 0.0005463814846629212, perc90: 0.0006492949814746734 },
            "Public order":                 { perc10: 0.0008172798186046697,  perc50: 0.0009836021727954902, perc90: 0.0013444334523545491 },
            "Robbery":                      { perc10: 0.0002792305382794765,  perc50: 0.00046568375888651525,perc90: 0.000689300812104986  },
            "Shoplifting":                  { perc10: 0.0005761694637402323,  perc50: 0.0008606817349696706, perc90: 0.0013819128356008556 },
            "Theft from the person":        { perc10: 0.00026182174011587784, perc50: 0.0004031819429385434, perc90: 0.0006322536644084826 },
            "Vehicle crime":                { perc10: 0.0007417747551676378,  perc50: 0.0009057550469162392, perc90: 0.0011864191223156827 },
            "Violence and sexual offences": { perc10: 0.001877466896086512,   perc50: 0.002636063324857588,  perc90: 0.003921851764093352  }
        },
	};

    let filters = fields.reduce((acc, field) => {
        acc[field.key] = field.key === 'Violence and sexual offences';
        return acc;
    }, {});

    // ── Track which source is currently active ──────────────────────────────────
    let activeSourceId = 'Counties';

    // ── Layer management ────────────────────────────────────────────────────────
    function addSourceAndLayers(sourceType) {
        activeSourceId = sourceType;

        const selectedFilters = fields.filter(f => filters[f.key]).map(f => f.key);
        const percentiles = selectedFilters.map(key => lookupTable[sourceType]?.[key]).filter(Boolean);
        const perc10 = percentiles.reduce((s, p) => s + p.perc10, 0);
        const perc50 = percentiles.reduce((s, p) => s + p.perc50, 0);
        const perc90 = percentiles.reduce((s, p) => s + p.perc90, 0);

        const fillExpression = [
            'interpolate', ['linear'],
            ['/', ['+', ...fields.map(field => filters[field.key]
                ? ['coalesce', ['to-number', ['get', field.key]], 0] : ['literal', 0])],
                ['coalesce', ['to-number', ['get', 'population']], 1]],
            perc10, 'rgba(0, 255, 0, 1)',
            perc50, 'rgba(255, 255, 0, 1)',
            perc90, 'rgba(255, 0, 0, 1)'
        ];

        const source = sourceType === 'Counties' ? {
            id: 'Counties',
            url: 'mapbox://cmccalmont.3zvqwnpv',
            sourceLayer: '20250102_lad2-4jg3gq'
        } : sourceType === 'LSOA' ? {
            id: 'LSOA',
            url: 'mapbox://cmccalmont.08sr0ngh',
            sourceLayer: '20250102_lsoa2-dyk016'
        } : {
            id: 'Ward',
            url: 'mapbox://cmccalmont.dzis41wj',
            sourceLayer: '20250102_ward2-0z9c6g'
        };

        map.addSource(source.id, { type: 'vector', url: source.url });
        console.log('fillExpression stops:', perc10, perc50, perc90);

        console.log('perc10:', perc10, 'perc50:', perc50, 'perc90:', perc90);
        console.log('sample ratio check - does any feature fall between these?');

        map.addLayer({
            id: `${source.id}-fills`,
            type: 'fill',
            source: source.id,
            'source-layer': source.sourceLayer,
            layout: {},
            paint: {
                'fill-color': fillExpression,
                'fill-opacity': 0.2
            }
        });

        map.addLayer({
            id: `${source.id}-borders`,
            type: 'line',
            source: source.id,
            'source-layer': source.sourceLayer,
            layout: {},
            paint: {
                'line-color': 'black',
                'line-width': ['case', ['boolean', ['feature-state', 'selected'], false], 4, 1]
            }
        });

        // Rebuild checkboxes
        while (filterGroup.firstChild) filterGroup.removeChild(filterGroup.firstChild);
        fields.forEach(field => {
            const checkbox = document.createElement('input');
            checkbox.type = 'checkbox';
            checkbox.id = `${field.key}-checkbox`;
            checkbox.dataset.filterKey = field.key;
            checkbox.className = 'filter-checkbox';
            checkbox.checked = filters[field.key];
            filterGroup.appendChild(checkbox);

            const label = document.createElement('label');
            label.setAttribute('for', `${field.key}-checkbox`);
            label.textContent = field.label;
            filterGroup.appendChild(label);
        });

        document.querySelectorAll('.filter-checkbox').forEach(checkbox => {
            checkbox.addEventListener('change', (e) => {
                filters[e.target.dataset.filterKey] = e.target.checked;
                updateFillColor();
            });
        });

        // ── Popup on click ──────────────────────────────────────────────────────
        //map.on('click', `${source.id}-fills`, (e) => {
        if (window._crimeClickHandler) {['Counties', 'LSOA', 'Ward'].forEach(l => {try { map.off('click', `${l}-fills`, window._crimeClickHandler); } catch(e) {}});}
        window._crimeClickHandler = (e) => {

            const feature = e.features[0];
            const coordinates = turf.centroid(feature).geometry.coordinates;
            const areaName = feature.properties["Area Name"] || 'Unknown Area';

            const activeFields = fields.filter(field => filters[field.key]);
            const allCrime = activeFields.reduce((sum, field) =>
                sum + (feature.properties[field.key] || 0), 0);
            const population = feature.properties.population || 0;
            const crimePerPerson = population > 0
                ? ((allCrime / population) * 1000).toFixed(1)
                : 'N/A';

            // Crime list rows — raw counts rounded to nearest integer
            const crimeRows = activeFields.map(field => {
                const val = feature.properties[field.key] || 0;
                return `<li>${field.label}: ${Math.round(val)}</li>`;
            }).join('');

            const urlToPreview = feature.properties["web_link"] || null;

            function buildPopup(affiliateHTML = '') {
                return `
                    <div>
                        <h3 class="popup-area-name">${areaName}</h3>
                        <hr class="popup-divider">
                        <ul class="popup-crime-list">${crimeRows}</ul>
                        <p class="popup-total">
                            <strong>Crime per 1000 people:</strong> ${crimePerPerson}
                        </p>
                        ${affiliateHTML ? `<div class="popup-affiliate">${affiliateHTML}</div>` : ''}
                    </div>`;
            }

            function showPopup(html) {
                new mapboxgl.Popup({ maxWidth: '280px' })
                    .setLngLat(coordinates)
                    .setHTML(html)
                    .addTo(map);
            }

            if (urlToPreview) {
                fetch('/api/preview?url=' + encodeURIComponent(urlToPreview))
                    .then(res => res.json())
                    .then(data => {
                        const affiliateHTML = `
                            <a href="${data.url}" target="_blank" rel="noopener noreferrer"
                               style="display:flex;align-items:center;gap:10px;text-decoration:none;color:#fff;">
                                <img src="${data.image}" alt="${data.title}"
                                     style="width:90px;height:55px;object-fit:cover;border-radius:4px;flex-shrink:0;">
                                <div>
                                    <div style="font-weight:bold;font-size:12px;">${data.title}</div>
                                    <div style="font-size:10px;color:#ccc;margin-top:2px;">${data.description}</div>
                                </div>
                            </a>`;
                        showPopup(buildPopup(affiliateHTML));
                    })
                    .catch(() => showPopup(buildPopup()));
            } else {
                showPopup(buildPopup());
            }
        };
        map.on('click', `${source.id}-fills`, window._crimeClickHandler);
        map.on('mouseenter', `${source.id}-fills`, () => { map.getCanvas().style.cursor = 'pointer'; });
        map.on('mouseleave', `${source.id}-fills`, () => { map.getCanvas().style.cursor = ''; });
    }

    // ── Colour update ───────────────────────────────────────────────────────────
    // Uses activeSourceId so we never have to guess from style layers.
    function updateFillColor() {
        const sourceId = activeSourceId;
        if (!map.getLayer(`${sourceId}-fills`)) return;

        const selectedFilters = fields.filter(f => filters[f.key]).map(f => f.key);

        const percentiles = selectedFilters
            .map(key => lookupTable[sourceId]?.[key])
            .filter(Boolean);

        // ×1000 converts stored per-person ratios → per-1000-people, matching the paint expression
        const totalPerc10 = percentiles.reduce((s, p) => s + p.perc10, 0);
        const totalPerc50 = percentiles.reduce((s, p) => s + p.perc50, 0);
        const totalPerc90 = percentiles.reduce((s, p) => s + p.perc90, 0);

        console.log(`[CrimeMap] source=${sourceId} thresholds: green<${totalPerc10.toFixed(3)} yellow<${totalPerc50.toFixed(3)} red>${totalPerc90.toFixed(3)} (per 1000)`);

        // Guard: if nothing selected, paint everything neutral grey
        if (percentiles.length === 0) {
            map.setPaintProperty(`${sourceId}-fills`, 'fill-color', 'rgba(128,128,128,1)');
            map.setPaintProperty(`${sourceId}-fills`, 'fill-opacity', 0.2);
            return;
        }

        // Paint expression also now explicitly ×1000 so the scale is "per 1000 people"
        map.setPaintProperty(`${sourceId}-fills`, 'fill-color', [
            'interpolate', ['linear'],
            ['/',
                ['+', ...fields.map(field => filters[field.key]
                    ? ['coalesce', ['to-number', ['get', field.key]], 0]
                    : ['literal', 0]

                )],
                ['coalesce', ['to-number', ['get', 'population']], 1]
            ],
            totalPerc10, 'rgba(0, 255, 0, 1)',
            totalPerc50, 'rgba(255, 255, 0, 1)',
            totalPerc90, 'rgba(255, 0, 0, 1)'
        ]);
        map.setPaintProperty(`${sourceId}-fills`, 'fill-opacity', 0.2);

        console.log("sourceId:", sourceId);
        console.log("selectedFilters:", selectedFilters);
        console.log("lookup exists:", lookupTable[sourceId]);
        console.log("percentiles:", percentiles);
    }

    function removeExistingLayers() {
        ['Counties', 'LSOA', 'Ward'].forEach(layer => {
            if (map.getLayer(`${layer}-fills`))   map.removeLayer(`${layer}-fills`);
            if (map.getLayer(`${layer}-borders`)) map.removeLayer(`${layer}-borders`);
            if (map.getSource(layer))             map.removeSource(layer);
        });
    }

    // ── Map load ────────────────────────────────────────────────────────────────
    map.on('load', () => {
        const dataSourceSelect = document.getElementById('data-source-select');
        const loadingSpinner   = document.getElementById('loading-spinner');

        addSourceAndLayers('Counties');

        dataSourceSelect.addEventListener('change', (e) => {
            const selectedSource = e.target.value;
            loadingSpinner.style.display = 'block';
            removeExistingLayers();
            addSourceAndLayers(selectedSource);

            setTimeout(() => {
                loadingSpinner.style.display = 'none';
            }, 1500);
        });

            // ── Border toggle ───────────────────────────────────────────────────────
        const borderToggle = document.getElementById('border-toggle');
        let bordersVisible = true;
        borderToggle.addEventListener('click', () => {
            bordersVisible = !bordersVisible;
            ['Counties', 'LSOA', 'Ward'].forEach(l => {
                if (map.getLayer(`${l}-borders`)) {
                    map.setLayoutProperty(`${l}-borders`, 'visibility', bordersVisible ? 'visible' : 'none');
                }
            });
            borderToggle.textContent = bordersVisible ? 'On' : 'Off';
            borderToggle.classList.toggle('active', bordersVisible);
        });
    });
</script>
</body>
</html>
